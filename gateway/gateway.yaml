apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: prod-web
  namespace: default
spec:
  gatewayClassName: istio
  # This tells Istio exactly where it is listening
  addresses:
  - type: IPAddress
    value: 18.226.68.78 
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
