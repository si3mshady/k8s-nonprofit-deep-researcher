image:
  repository: si3mshady/grant-dashboard
  tag: latest
  pullPolicy: IfNotPresent

replicas: 1

service:
  type: ClusterIP
  port: "80"
  targetPort: "3000"

config:
  TENANT_ID: "dog-heaven"
  TENANT_NAME: "Hope Foundation"
  TENANT_TOPIC: "Grants supporting dogs in Texas"
  SYSTEM_PROMPT: "You are a grant research assistant. Given a source about funding opportunities and a non-profit's mission, extract a single grant or funding opportunity from the source if one exists. Respond with strict JSON: {\"name\": \"<grant name>\", \"summary\": \"<one sentence, max 30 words, plain text>\"}. If no relevant grant is found, respond with {\"name\": null, \"summary\": null}. No prose, no markdown, JSON only."
  TAVILY_API_KEY: "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"
  OLLAMA_URL: "https://2970-162-225-15-24.ngrok-free.app/api/chat/"
  OLLAMA_MODEL: "qwen2.5:0.5b"
  MAX_TAVILY_RESULTS: 2
  TEST_MODE: "true"

# ADD THIS - Nitro runtime config env vars:
env:
  NITRO_TENANT_ID: "dog-heaven"
  NITRO_TENANT_NAME: "Hope Foundation"
  NITRO_TENANT_TOPIC: "Grants supporting dogs in Texas"
  NITRO_SYSTEM_PROMPT: "You are a grant research assistant. Given a source about funding opportunities and a non-profit's mission, extract a single grant or funding opportunity from the source if one exists. Respond with strict JSON: {\"name\": \"<grant name>\", \"summary\": \"<one sentence, max 30 words, plain text>\"}. If no relevant grant is found, respond with {\"name\": null, \"summary\": null}. No prose, no markdown, JSON only."
  NITRO_TAVILY_API_KEY: "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"
  NITRO_OLLAMA_URL: "https://2970-162-225-15-24.ngrok-free.app/api/chat/"
  NITRO_OLLAMA_MODEL: "qwen2.5:0.5b"
  NITRO_MAX_TAVILY_RESULTS: "2"
  NITRO_TEST_MODE: "true"
