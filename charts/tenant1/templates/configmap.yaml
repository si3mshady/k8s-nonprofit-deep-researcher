apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app: {{ .Release.Name }}
data:
  config.json: |
    {
      "TENANT_ID": {{ .Values.config.TENANT_ID | quote }},
      "TENANT_NAME": {{ .Values.config.TENANT_NAME | quote }},
      "TENANT_TOPIC": {{ .Values.config.TENANT_TOPIC | quote }},
      "SYSTEM_PROMPT": {{ .Values.config.SYSTEM_PROMPT | quote }},
      "TAVILY_API_KEY": {{ .Values.config.TAVILY_API_KEY | quote }},
      "OLLAMA_URL": {{ .Values.config.OLLAMA_URL | quote }},
      "OLLAMA_MODEL": {{ .Values.config.OLLAMA_MODEL | quote }},
      "MAX_TAVILY_RESULTS": {{ .Values.config.MAX_TAVILY_RESULTS }},
      "TEST_MODE": {{ .Values.config.TEST_MODE | quote }}
    }
