apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            # --- Base Environment ---
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "{{ .Values.service.targetPort }}"
            - name: HOST
              value: "0.0.0.0"
              
            # --- Standard Config Vars ---
            - name: TENANT_ID
              value: "{{ .Values.config.TENANT_ID }}"
            - name: TENANT_NAME
              value: "{{ .Values.config.TENANT_NAME }}"
            - name: TENANT_TOPIC
              value: "{{ .Values.config.TENANT_TOPIC }}"
            - name: SYSTEM_PROMPT
              value: {{ .Values.config.SYSTEM_PROMPT | quote }}
            - name: TAVILY_API_KEY
              value: "{{ .Values.config.TAVILY_API_KEY }}"
            - name: OLLAMA_URL
              value: "{{ .Values.config.OLLAMA_URL }}"
            - name: OLLAMA_MODEL
              value: "{{ .Values.config.OLLAMA_MODEL }}"
            - name: MAX_TAVILY_RESULTS
              value: "{{ .Values.config.MAX_TAVILY_RESULTS }}"
            - name: TEST_MODE
              value: "{{ .Values.config.TEST_MODE }}"
              
            # --- Nitro Runtime Env Vars ---
            - name: NITRO_TENANT_ID
              value: "{{ .Values.env.NITRO_TENANT_ID }}"
            - name: NITRO_TENANT_NAME
              value: "{{ .Values.env.NITRO_TENANT_NAME }}"
            - name: NITRO_TENANT_TOPIC
              value: "{{ .Values.env.NITRO_TENANT_TOPIC }}"
            - name: NITRO_SYSTEM_PROMPT
              value: {{ .Values.env.NITRO_SYSTEM_PROMPT | quote }}
            - name: NITRO_TAVILY_API_KEY
              value: "{{ .Values.env.NITRO_TAVILY_API_KEY }}"
            - name: NITRO_OLLAMA_URL
              value: "{{ .Values.env.NITRO_OLLAMA_URL }}"
            - name: NITRO_OLLAMA_MODEL
              value: "{{ .Values.env.NITRO_OLLAMA_MODEL }}"
            - name: NITRO_MAX_TAVILY_RESULTS
              value: "{{ .Values.env.NITRO_MAX_TAVILY_RESULTS }}"
            - name: NITRO_TEST_MODE
              value: "{{ .Values.env.NITRO_TEST_MODE }}"
