# Optional nginx reverse proxy in front of the Node app container.
# Use this when you want TLS termination, gzip, caching, or to expose the
# app on port 80/443 while the Node process stays on 3000 internally.
#
# Run nginx as a separate container (recommended) and point `proxy_pass`
# at the Node container's service name.

worker_processes  auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript;

  upstream app_upstream {
    # In docker compose this resolves to the `app` service.
    # In Kubernetes use the Service DNS name (e.g. grant-dashboard:3000).
    server app:3000;
  }

  server {
    listen 80;
    server_name _;

    # Long timeouts: Ollama deep-research calls can take a while.
    proxy_read_timeout  600s;
    proxy_send_timeout  600s;
    proxy_connect_timeout 60s;

    # Never cache runtime tenant config. Every browser refresh must ask the app
    # container for the currently mounted deploy/config.runtime.json file.
    location = /config.json {
      proxy_pass         http://app_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      add_header         Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
      add_header         Pragma "no-cache" always;
      add_header         Expires "0" always;
    }

    location / {
      proxy_pass         http://app_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }
  }
}
